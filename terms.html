<script>
document.addEventListener('DOMContentLoaded', function () {
    injectSharedHTML('subjects');
    const p       = getParams();
    const grade   = parseInt(p.grade) || 13;
    const stream  = p.stream  || null;
    const subject = p.subject || '';
    const type    = p.type    || 'School Term Papers';
    const year    = p.year    || '';

    document.getElementById('back-btn').href =
        buildUrl('years.html', { grade, stream:stream||'', subject, type });

    document.getElementById('page-subtitle').textContent =
        `${subject} — ${PAPER_TYPE_LABELS[type]||type} — ${year}`;

    setSEOMeta({
        title: `${subject} Grade ${grade} ${year} Term Selection`,
        description: `Choose a term (1st, 2nd, 3rd) to access ${subject} Grade ${grade} ${type} papers for ${year}.`,
        canonical: 'terms.html' + window.location.search
    });

    const bcSteps = [
        { label: 'Home',   href: 'index.html'  },
        { label: 'Grades', href: 'grades.html' }
    ];
    if (grade === 12 || grade === 13) {
        bcSteps.push({ label:`Grade ${grade}`, href: buildUrl('stream.html',   { grade }) });
        if (stream) bcSteps.push({ label: stream, href: buildUrl('subjects.html', { grade, stream }) });
    } else {
        bcSteps.push({ label:`Grade ${grade}`, href: buildUrl('subjects.html', { grade }) });
    }
    bcSteps.push({ label: subject,                       href: buildUrl('category.html', { grade, stream:stream||'', subject }) });
    bcSteps.push({ label: PAPER_TYPE_LABELS[type]||type, href: buildUrl('years.html',    { grade, stream:stream||'', subject, type }) });
    bcSteps.push({ label: String(year), href: null });
    renderBreadcrumb(bcSteps);
    injectBreadcrumbSchema(bcSteps);

    // Build term links
    const termKeys = ['First Term', 'Second Term', 'Third Term'];
    [1,2,3].forEach(n => {
        const term = termKeys[n-1];
        const href = buildUrl('papers.html', { grade, stream:stream||'', subject, type, year, term });
        document.getElementById(`term-${n}`).href = href;
        document.getElementById(`sub-${n}`).textContent = `${year} • Term 0${n}`;
    });
});
</script>
