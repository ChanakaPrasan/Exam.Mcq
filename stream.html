<script>
document.addEventListener('DOMContentLoaded', function () {
    injectSharedHTML('subjects');
    const p = getParams();
    const grade = p.grade || '13';

    document.getElementById('grade-label').textContent = `Grade ${grade}`;
    setSEOMeta({
        title: `Grade ${grade} A/L Streams`,
        description: `Select your A/L academic stream for Grade ${grade} — Physical Science, Biological Science, Commerce, Arts or Technology.`,
        canonical: `stream.html?grade=${grade}`
    });
    renderBreadcrumb([
        { label: 'Home',           href: 'index.html'  },
        { label: 'Grades',         href: 'grades.html' },
        { label: `Grade ${grade}`, href: null }
    ]);

    const streams = [
        { key: 'Physical Science (Maths)', label: 'Physical Science', icon: '📐', desc: 'Combined Mathematics, Physics, Chemistry / ICT', cls: 'grad-maths' },
        { key: 'Biological Science',       label: 'Biological Science',icon: '🧬', desc: 'Biology, Physics, Chemistry / Agriculture',       cls: 'grad-bio'   },
        { key: 'Commerce',                 label: 'Commerce',          icon: '📊', desc: 'Accounting, Business Studies, Economics',          cls: 'grad-com'   },
        { key: 'Arts',                     label: 'Arts & Humanities', icon: '🎨', desc: 'Languages, Logic, Geography, History',            cls: 'grad-arts'  },
        { key: 'Technology',               label: 'Technology',        icon: '⚙️', desc: 'ET / BST / SFT / ICT',                           cls: 'grad-tech'  }
    ];

    const grid = document.getElementById('stream-grid');
    grid.innerHTML = streams.map(s => {
        const href = buildUrl('subjects.html', { grade, stream: s.key });
        return `
        <a href="${href}" class="hover-card ${s.cls} p-8 rounded-3xl no-underline cursor-pointer group">
            <div class="text-4xl mb-4">${s.icon}</div>
            <h3 class="text-xl font-bold text-slate-900">${s.label}</h3>
            <p class="text-sm text-slate-600 mt-1">${s.desc}</p>
        </a>`;
    }).join('');
});
</script>
