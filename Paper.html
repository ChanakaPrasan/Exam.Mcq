<script src="script.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function () {
    injectSharedHTML('subjects');
    const p = getParams();
    if (!p.id) {
        alert("Invalid Paper URL!");
        window.history.back();
        return;
    }

    // Wait for the papers AND questions to load from Firestore
    let retryCount = 0;
    const checkReady = setInterval(() => {
        if (window.firebaseLoaded) {
            clearInterval(checkReady);
            startPaperById(p.id);
            
            // Set dynamic SEO tags
            const paper = publishedPapers.find(x => x.id === p.id);
            if (paper) {
                setSEOMeta({
                    title: `${paper.paperName} | Sahasra`,
                    description: `Start the ${paper.paperName} test on Sahasra today.`,
                    canonical: 'Paper.html' + window.location.search
                });
            }
        } else if (retryCount > 50) { // 5 seconds
            clearInterval(checkReady);
            alert("Could not load paper data. Please try again.");
            window.history.back();
        }
        retryCount++;
    }, 100);
});
</script>
